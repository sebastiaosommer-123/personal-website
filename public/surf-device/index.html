    <script vid="9">
        let audioCtx = null;

        const VIDEOS = [
            'https://res.cloudinary.com/dcewfztrv/video/upload/q_auto,f_auto,vc_auto/v1775322457/1_l2hxt0.mov',
            'https://res.cloudinary.com/dcewfztrv/video/upload/q_auto,f_auto,vc_auto/v1775322120/2_axbpw4.mov',
            'https://res.cloudinary.com/dcewfztrv/video/upload/q_auto,f_auto,vc_auto/v1775322760/3_q5yufj.mp4',
        ];
        const VOLUME_MAX = 16;
        let currentVideoIndex = 0;
        let volumeLevel = 0;

        let volFadeTimer = null;

        function updateVolumeDots(level) {
            const indicator = document.getElementById('vol-indicator');
            // Fade in
            indicator.style.transition = 'opacity 0.2s ease';
            indicator.style.opacity = '1';
            // Update dot fill
            document.querySelectorAll('.vol-dot').forEach(dot => {
                const dotLevel = parseInt(dot.dataset.level);
                dot.style.backgroundColor = dotLevel <= level
                    ? 'rgba(255,255,255,0.75)'
                    : 'rgba(255,255,255,0.15)';
            });
            // Reset fade-out timer
            clearTimeout(volFadeTimer);
            volFadeTimer = setTimeout(() => {
                indicator.style.transition = 'opacity 0.4s ease';
                indicator.style.opacity = '0';
            }, 1000);
        }

        function loadVideo(index) {
            const video = document.getElementById('surf-video');
            currentVideoIndex = index;
            video.src = VIDEOS[currentVideoIndex];
            video.play();
        }

        function playClick() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;
            const duration = 0.018;

            // Very short noise burst — dry tap, no tone
            const bufferSize = Math.floor(audioCtx.sampleRate * duration);
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            // High-pass to cut low rumble — keeps it crisp
            const hpf = audioCtx.createBiquadFilter();
            hpf.type = 'highpass';
            hpf.frequency.value = 1800;

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.12, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

            noise.connect(hpf);
            hpf.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noise.start(now);
        }

        function playVolumeClick() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;
            const duration = 0.010;

            const bufferSize = Math.floor(audioCtx.sampleRate * duration);
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const hpf = audioCtx.createBiquadFilter();
            hpf.type = 'highpass';
            hpf.frequency.value = 3500;

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.07, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

            noise.connect(hpf);
            hpf.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noise.start(now);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sliders = document.querySelectorAll('[data-slider]');
            sliders.forEach(slider => {
                const knob = slider.querySelector('[data-knob]');
                let isDragging = false;
                const updatePosition = (clientX) => {
                    const rect = slider.getBoundingClientRect();
                    const knobRadius = knob.offsetWidth / 2;
                    let newLeft = clientX - rect.left - knobRadius;
                    const maxLeft = rect.width - knob.offsetWidth;
                    newLeft = Math.max(0, Math.min(newLeft, maxLeft));
                    const percentage = (newLeft / maxLeft) * 100;
                    knob.style.left = `${percentage}%`;
                };
                knob.addEventListener('mousedown', (e) => { isDragging = true; e.preventDefault(); });
                document.addEventListener('mousemove', (e) => { if (!isDragging) return; updatePosition(e.clientX); });
                document.addEventListener('mouseup', () => { isDragging = false; });
                knob.addEventListener('touchstart', (e) => { isDragging = true; });
                document.addEventListener('touchmove', (e) => { if (!isDragging) return; updatePosition(e.touches[0].clientX); });
                document.addEventListener('touchend', () => { isDragging = false; });
            });

            // Rotary knob rotation logic
            const rotaryKnob = document.querySelector('[data-rotary]');
            if (rotaryKnob) {
                let isRotating = false;
                let currentAngle = 0;
                let startAngle = 0;
                let knobCenter = { x: 0, y: 0 };
                
                const getAngle = (x, y) => {
                    const dx = x - knobCenter.x;
                    const dy = y - knobCenter.y;
                    return Math.atan2(dy, dx) * (180 / Math.PI);
                };
                
                const updateKnob = (angle) => {
                    currentAngle = angle;
                    rotaryKnob.style.transform = `rotate(${currentAngle}deg)`;
                };
                
                const startRotation = (e) => {
                    isRotating = true;
                    const rect = rotaryKnob.getBoundingClientRect();
                    knobCenter.x = rect.left + rect.width / 2;
                    knobCenter.y = rect.top + rect.height / 2;
                    const clientX = e.clientX || e.touches[0].clientX;
                    const clientY = e.clientY || e.touches[0].clientY;
                    startAngle = getAngle(clientX, clientY) - currentAngle;
                    e.preventDefault();
                };
                
                const rotate = (e) => {
                    if (!isRotating) return;
                    const clientX = e.clientX || e.touches[0].clientX;
                    const clientY = e.clientY || e.touches[0].clientY;
                    const angle = getAngle(clientX, clientY) - startAngle;
                    updateKnob(angle);
                };
                
                const endRotation = () => {
                    isRotating = false;
                };
                
                rotaryKnob.addEventListener('mousedown', startRotation);
                rotaryKnob.addEventListener('touchstart', startRotation, { passive: false });
                document.addEventListener('mousemove', rotate);
                document.addEventListener('touchmove', rotate, { passive: false });
                document.addEventListener('mouseup', endRotation);
                document.addEventListener('touchend', endRotation);
            }

            // Main button click sounds
            document.querySelectorAll('button[aria-label]:not([aria-label^="Volume"])').forEach(btn => {
                btn.addEventListener('click', () => playClick());
            });

            // Volume button sounds — thin tick, fires on pointerdown for reliability
            document.querySelectorAll('button[aria-label^="Volume"]').forEach(btn => {
                btn.addEventListener('pointerdown', () => playVolumeClick());
            });

            // Video setup
            const video = document.getElementById('surf-video');
            video.src = VIDEOS[currentVideoIndex];
            video.volume = 0;
            // Init dot colors without triggering fade-in
            document.querySelectorAll('.vol-dot').forEach(dot => {
                dot.style.backgroundColor = 'rgba(255,255,255,0.15)';
            });

            // Playback controls
            document.querySelector('button[aria-label="Previous"]').addEventListener('click', () => {
                loadVideo((currentVideoIndex - 1 + VIDEOS.length) % VIDEOS.length);
            });

            document.querySelector('button[aria-label="Play/Pause"]').addEventListener('click', () => {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            });

            document.querySelector('button[aria-label="Next"]').addEventListener('click', () => {
                loadVideo((currentVideoIndex + 1) % VIDEOS.length);
            });

            document.querySelector('button[aria-label="Power"]').addEventListener('click', () => {
                window.parent.postMessage('surf-device-close', '*');
            });

            // Volume controls
            document.querySelector('button[aria-label="Volume Up"]').addEventListener('pointerdown', () => {
                volumeLevel = Math.min(VOLUME_MAX, volumeLevel + 1);
                video.volume = Math.pow(volumeLevel / VOLUME_MAX, 3);
                video.muted = volumeLevel === 0;
                updateVolumeDots(volumeLevel);
            });

            document.querySelector('button[aria-label="Volume Down"]').addEventListener('pointerdown', () => {
                volumeLevel = Math.max(0, volumeLevel - 1);
                video.volume = Math.pow(volumeLevel / VOLUME_MAX, 3);
                video.muted = volumeLevel === 0;
                updateVolumeDots(volumeLevel);
            });
        });
        
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { mono: ['"IBM Plex Mono"', 'monospace'] },
                    colors: {
                        gunmetal: {
                            900: '#1f2125',

                            700: '#34383e',
                            600: '#3f444b',
                            500: '#4e545c',
                            400: '#646b75',
                        }
                    }
                }
            }
        }
    </script>
